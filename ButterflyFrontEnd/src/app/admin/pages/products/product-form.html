<div class="product-form">
  <div class="product-form__header">
    <div>
      <h1 class="product-form__title">{{ pageTitle() }}</h1>
      <p class="product-form__subtitle">{{ isEditing() ? 'Modifica los datos del producto existente' : 'Completa los campos para añadir un nuevo producto' }}</p>
    </div>
    <a class="product-form__back-btn" routerLink="/admin/productos">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12" />
        <polyline points="12 19 5 12 12 5" />
      </svg>
      Volver
    </a>
  </div>

  <form class="product-form__form" (ngSubmit)="saveProduct()" #productForm="ngForm">
    <div class="product-form__card">
      <h2 class="product-form__card-title">Información General</h2>

      <!-- Nombre -->
      <div class="product-form__field">
        <label class="product-form__label" for="name">Nombre del producto</label>
        <input
          id="name"
          class="product-form__input"
          type="text"
          [(ngModel)]="form.name"
          name="name"
          placeholder="Ej: Vestido Floral Primavera"
          required
        />
      </div>

      <!-- Descripción -->
      <div class="product-form__field">
        <label class="product-form__label" for="description">Descripción</label>
        <textarea
          id="description"
          class="product-form__textarea"
          [(ngModel)]="form.description"
          name="description"
          placeholder="Describe el producto, sus materiales y características principales..."
          rows="4"
        ></textarea>
      </div>

      <!-- Marca -->
      <div class="product-form__row">
        <div class="product-form__field">
          <label class="product-form__label" for="brand">Marca</label>
          <select
            id="brand"
            class="product-form__select"
            [(ngModel)]="form.brand"
            name="brand"
          >
            <option value="" disabled>Seleccionar marca</option>
            @for (brand of brands; track brand) {
              <option [value]="brand">{{ brand }}</option>
            }
          </select>
        </div>

        <!-- Categoría -->
        <div class="product-form__field">
          <label class="product-form__label" for="category">Categoría</label>
          <select
            id="category"
            class="product-form__select"
            [(ngModel)]="form.category"
            name="category"
          >
            <option value="" disabled>Seleccionar categoría</option>
            @for (cat of categories; track cat) {
              <option [value]="cat">{{ cat }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Disponible (switch) -->
      <div class="product-form__field">
        <label class="product-form__label">Disponible</label>
        <div class="product-form__switch-group">
          <button
            type="button"
            class="product-form__switch-btn"
            [class.product-form__switch-btn--on]="form.available"
            (click)="form.available = true"
          >
            <span class="product-form__switch-dot"></span>
            Sí
          </button>
          <button
            type="button"
            class="product-form__switch-btn"
            [class.product-form__switch-btn--off]="!form.available"
            (click)="form.available = false"
          >
            <span class="product-form__switch-dot"></span>
            No
          </button>
        </div>
      </div>
    </div>

    <!-- Acciones -->
    <div class="product-form__actions">
      <a class="product-form__btn product-form__btn--secondary" routerLink="/admin/productos">
        Cancelar
      </a>
      <button
        type="submit"
        class="product-form__btn product-form__btn--primary"
        [disabled]="!productForm.form.valid"
      >
        {{ isEditing() ? 'Guardar Cambios' : 'Crear Producto' }}
      </button>
    </div>
  </form>
</div>
