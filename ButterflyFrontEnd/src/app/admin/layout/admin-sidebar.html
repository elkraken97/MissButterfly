<nav class="admin-sidebar">
  <div class="admin-sidebar__header">
    <span class="admin-sidebar__logo">
      <span class="admin-sidebar__logo-accent">Butterfly</span>
    </span>
    <span class="admin-sidebar__badge">Admin</span>
  </div>

  <div class="admin-sidebar__nav">
    <span class="admin-sidebar__section-label">General</span>

    <a class="admin-sidebar__link"
       routerLink="/admin/dashboard"
       routerLinkActive="admin-sidebar__link--active"
       [routerLinkActiveOptions]="{ exact: true }">
      <span class="admin-sidebar__link-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
      </span>
      <span>Dashboard</span>
    </a>

    <span class="admin-sidebar__section-label">Tienda</span>

    <a class="admin-sidebar__link"
       routerLink="/admin/productos"
       routerLinkActive="admin-sidebar__link--active"
       [routerLinkActiveOptions]="{ exact: true }">
      <span class="admin-sidebar__link-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 0 1-8 0" />
        </svg>
      </span>
      <span>Productos</span>
    </a>

    <a class="admin-sidebar__link"
       routerLink="/admin/productos/nuevo"
       routerLinkActive="admin-sidebar__link--active"
       [routerLinkActiveOptions]="{ exact: true }">
      <span class="admin-sidebar__link-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14" />
          <path d="M5 12h14" />
        </svg>
      </span>
      <span>Nuevo Producto</span>
    </a>

    <a class="admin-sidebar__link"
       routerLink="/admin/categorias"
       routerLinkActive="admin-sidebar__link--active"
       [routerLinkActiveOptions]="{ exact: true }">
      <span class="admin-sidebar__link-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 9V5a2 2 0 0 1 2-2h4.5l2 2H20a2 2 0 0 1 2 2v4" />
          <path d="M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4" />
          <rect x="2" y="9" width="20" height="6" rx="2" />
        </svg>
      </span>
      <span>Categorías</span>
    </a>

    <a class="admin-sidebar__link"
       routerLink="/admin/pedidos"
       routerLinkActive="admin-sidebar__link--active"
       [routerLinkActiveOptions]="{ exact: true }">
      <span class="admin-sidebar__link-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <polyline points="10 9 9 9 8 9" />
        </svg>
      </span>
      <span>Pedidos</span>
    </a>
  </div>

  <div class="admin-sidebar__footer">
    <div class="admin-sidebar__user">
      <div class="admin-sidebar__avatar">
        {{ auth.user()?.name?.charAt(0) || 'A' }}
      </div>
      <div class="admin-sidebar__user-info">
        <span class="admin-sidebar__user-name">{{ auth.user()?.name || 'Admin' }}</span>
        <span class="admin-sidebar__user-role">{{ auth.user()?.email || 'admin@butterfly.com' }}</span>
      </div>
    </div>
    <a class="admin-sidebar__link" routerLink="/">
      <span class="admin-sidebar__link-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </span>
      <span>Volver al sitio</span>
    </a>
    <button class="admin-sidebar__link admin-sidebar__link--logout" (click)="logout()">
      <span class="admin-sidebar__link-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </span>
      <span>Cerrar sesión</span>
    </button>
  </div>
</nav>
