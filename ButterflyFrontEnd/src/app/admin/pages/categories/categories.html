<div class="categories">
  <div class="categories__header">
    <div class="categories__title-group">
      <h1 class="categories__title">Categorías</h1>
      <p class="categories__count">{{ categories().length }} categorías</p>
    </div>
    <button class="categories__add-btn" (click)="openNewModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14" />
        <path d="M5 12h14" />
      </svg>
      Nueva Categoría
    </button>
  </div>

  <admin-table
    [columns]="columns"
    [data]="categories()"
    [actions]="actions"
    [emptyMessage]="'No hay categorías disponibles'"
    (action)="onAction($event.key, $event.row)"
  />

  <!-- Modal -->
  @if (showModal()) {
    <div class="categories__modal-overlay" (click)="closeModal()">
      <div class="categories__modal" (click)="$event.stopPropagation()">
        <div class="categories__modal-header">
          <h2 class="categories__modal-title">{{ modalTitle }}</h2>
          <button class="categories__modal-close" (click)="closeModal()" aria-label="Cerrar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <form class="categories__modal-form" (ngSubmit)="saveCategoria()" #CategoriaForm="ngForm">
          <div class="categories__modal-body">
            <div class="categories__field">
              <label class="categories__label" for="CategoriaName">Nombre de la categoría</label>
              <input
                id="CategoriaName"
                class="categories__input"
                type="text"
                [(ngModel)]="formName"
                name="CategoriaName"
                placeholder="Ej: Blusas, Vestidos, Faldas..."
                required
                autofocus
              />
            </div>
          </div>

          <div class="categories__modal-actions">
            <button type="button" class="categories__btn categories__btn--secondary" (click)="closeModal()">
              Cancelar
            </button>
            <button
              type="submit"
              class="categories__btn categories__btn--primary"
              [disabled]="!formName.trim()"
            >
              {{ isEditing ? 'Guardar Cambios' : 'Crear Categoría' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
