<header class="admin-topbar">
  <div class="admin-topbar__left">
    <button class="admin-topbar__menu-btn" (click)="toggleSidebar.emit()" aria-label="Abrir menú">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>

    <nav class="admin-topbar__breadcrumb">
      <a class="admin-topbar__crumb" routerLink="/admin/dashboard">Admin</a>
      <span class="admin-topbar__separator">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </span>
      <span class="admin-topbar__crumb admin-topbar__crumb--current">Dashboard</span>
    </nav>
  </div>

  <div class="admin-topbar__right">
    <button class="admin-topbar__icon-btn" aria-label="Notificaciones">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      <span class="admin-topbar__notification-dot"></span>
    </button>

    <div class="admin-topbar__divider"></div>

    <div class="admin-topbar__user">
      <div class="admin-topbar__avatar">A</div>
      <div class="admin-topbar__user-info">
        <span class="admin-topbar__user-name">Admin</span>
        <span class="admin-topbar__user-role">Administradora</span>
      </div>
    </div>
  </div>
</header>
